---
contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - ca-certificates-bundle
    - wolfi-baselayout
    - glibc
    - libgcc
    - libstdc++
archs:
  - x86_64
  - aarch64
paths:
  - path: /run
    type: directory
    permissions: 0o755
  - path: /home/nonroot
    type: directory
    permissions: 0o755
accounts:
  groups:
    - groupname: istio-proxy
      gid: 1337
  users:
    - username: nonroot
      uid: 65532
    - username: nobody
      uid: 65534
    - username: istio-proxy
      uid: 1337
      gid: 1337
      shell: /sbin/nologin
  run-as: 65532
environment:
  PATH: /usr/local/sbin:/usr/local/bin:/usr/bin:/usr/sbin:/sbin:/bin
work-dir: /home/nonroot
