---
name: Istio Build Workflow
on:
  # schedule:
  #   - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:
    inputs:
      istio_version:
        description: 'Single Istio version to build (e.g., 1.26.2), or leave empty to build all supported versions'
        required: false
        default: ''
        type: string
      arch:
        description: 'Architecture to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - amd64
          - arm64
  # push:
  #   branches:
  #     - master
  #     - main
  #     - 'releases/*'

jobs:
  discover:
    name: Discover versions to build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      versions: ${{ steps.resolve.outputs.versions }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Resolve versions to build
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPORT_HUB: ghcr.io/${{ github.repository }}
          INPUT_VERSION: ${{ inputs.istio_version }}
        run: uv run ./discover.py

  build-envoy-1:
    name: 'Build Envoy ${{ matrix.istio_version }} (${{ matrix.arch.name }}) [pass 1]'
    needs: discover
    if: needs.discover.outputs.versions != '[]'
    runs-on: ${{ matrix.arch.runner }}
    timeout-minutes: 330
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        istio_version: ${{ fromJson(needs.discover.outputs.versions) }}
        arch:
          - name: amd64
            runner: ubuntu-24.04
          - name: arm64
            runner: ubuntu-24.04-arm
        exclude:
          - arch:
              name: ${{ inputs.arch == 'arm64' && 'amd64' || inputs.arch == 'amd64' && 'arm64' || 'none' }}
    steps:
      - name: Check for existing Envoy artifact
        id: artifact-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_RUN=$(gh api "repos/${{ github.repository }}/actions/artifacts?name=envoy-${{ matrix.istio_version }}-${{ matrix.arch.name }}" \
            --jq '[.artifacts[] | select(.expired == false)] | first | .workflow_run.id // empty')
          if [ -n "$ARTIFACT_RUN" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Found existing artifact from run $ARTIFACT_RUN, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Free up disk space
        if: steps.artifact-check.outputs.exists != 'true'
        run: |
          sudo rm -rf \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/share/boost
          sudo docker image prune --all --force
          df -h /

      - name: Checkout Repository
        if: steps.artifact-check.outputs.exists != 'true'
        uses: actions/checkout@v6

      - name: Install uv
        if: steps.artifact-check.outputs.exists != 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install Deps
        if: steps.artifact-check.outputs.exists != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc++-18-dev \
            libc++abi-18-dev \
            libstdc++-12-dev
          # LLVM toolchain needs libtinfo5 which isn't in noble repos
          ARCH=$(dpkg --print-architecture)
          if [ "$ARCH" = "arm64" ]; then
            DEB="libtinfo5_6.3-2_arm64.deb"
            curl -sfLO "http://ports.ubuntu.com/pool/universe/n/ncurses/${DEB}"
          else
            DEB="libtinfo5_6.3-2ubuntu0.1_amd64.deb"
            curl -sfLO "http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/${DEB}"
          fi
          sudo dpkg -i "${DEB}"
          rm "${DEB}"

      - name: Restore Bazel disk cache
        if: steps.artifact-check.outputs.exists != 'true'
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-disk-${{ matrix.istio_version }}-${{ matrix.arch.name }}-${{ github.run_id }}
          restore-keys: |
            bazel-disk-${{ matrix.istio_version }}-${{ matrix.arch.name }}-

      - name: Build Envoy with FIPS BoringSSL
        if: steps.artifact-check.outputs.exists != 'true'
        env:
          BAZEL_DISK_CACHE: ~/.cache/bazel-disk
        run: uv run ./build.py --version ${{ matrix.istio_version }} --arch ${{ matrix.arch.name }} --stage envoy --timeout 300

      - name: Save Bazel disk cache
        if: always() && steps.artifact-check.outputs.exists != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-disk-${{ matrix.istio_version }}-${{ matrix.arch.name }}-${{ github.run_id }}

      - name: Upload Envoy binary
        if: steps.artifact-check.outputs.exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: envoy-${{ matrix.istio_version }}-${{ matrix.arch.name }}
          path: proxy/bazel-bin/envoy
          if-no-files-found: ignore
          retention-days: 1

  build-envoy-2:
    name: 'Build Envoy ${{ matrix.istio_version }} (${{ matrix.arch.name }}) [pass 2]'
    needs: [discover, build-envoy-1]
    if: needs.discover.outputs.versions != '[]'
    runs-on: ${{ matrix.arch.runner }}
    timeout-minutes: 330
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        istio_version: ${{ fromJson(needs.discover.outputs.versions) }}
        arch:
          - name: amd64
            runner: ubuntu-24.04
          - name: arm64
            runner: ubuntu-24.04-arm
        exclude:
          - arch:
              name: ${{ inputs.arch == 'arm64' && 'amd64' || inputs.arch == 'amd64' && 'arm64' || 'none' }}
    steps:
      - name: Check for existing Envoy artifact
        id: artifact-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_RUN=$(gh api "repos/${{ github.repository }}/actions/artifacts?name=envoy-${{ matrix.istio_version }}-${{ matrix.arch.name }}" \
            --jq '[.artifacts[] | select(.expired == false)] | first | .workflow_run.id // empty')
          if [ -n "$ARTIFACT_RUN" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Found existing artifact from run $ARTIFACT_RUN, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Free up disk space
        if: steps.artifact-check.outputs.exists != 'true'
        run: |
          sudo rm -rf \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/share/boost
          sudo docker image prune --all --force
          df -h /

      - name: Checkout Repository
        if: steps.artifact-check.outputs.exists != 'true'
        uses: actions/checkout@v6

      - name: Install uv
        if: steps.artifact-check.outputs.exists != 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install Deps
        if: steps.artifact-check.outputs.exists != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc++-18-dev \
            libc++abi-18-dev \
            libstdc++-12-dev
          # LLVM toolchain needs libtinfo5 which isn't in noble repos
          ARCH=$(dpkg --print-architecture)
          if [ "$ARCH" = "arm64" ]; then
            DEB="libtinfo5_6.3-2_arm64.deb"
            curl -sfLO "http://ports.ubuntu.com/pool/universe/n/ncurses/${DEB}"
          else
            DEB="libtinfo5_6.3-2ubuntu0.1_amd64.deb"
            curl -sfLO "http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/${DEB}"
          fi
          sudo dpkg -i "${DEB}"
          rm "${DEB}"

      - name: Restore Bazel disk cache
        if: steps.artifact-check.outputs.exists != 'true'
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-disk-${{ matrix.istio_version }}-${{ matrix.arch.name }}-${{ github.run_id }}
          restore-keys: |
            bazel-disk-${{ matrix.istio_version }}-${{ matrix.arch.name }}-

      - name: Build Envoy with FIPS BoringSSL
        if: steps.artifact-check.outputs.exists != 'true'
        env:
          BAZEL_DISK_CACHE: ~/.cache/bazel-disk
        run: uv run ./build.py --version ${{ matrix.istio_version }} --arch ${{ matrix.arch.name }} --stage envoy --timeout 300

      - name: Save Bazel disk cache
        if: always() && steps.artifact-check.outputs.exists != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-disk-${{ matrix.istio_version }}-${{ matrix.arch.name }}-pass2-${{ github.run_id }}

      - name: Upload Envoy binary
        if: steps.artifact-check.outputs.exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: envoy-${{ matrix.istio_version }}-${{ matrix.arch.name }}
          path: proxy/bazel-bin/envoy
          retention-days: 1

      - name: Verify Envoy binary exists
        if: steps.artifact-check.outputs.exists != 'true'
        run: |
          if [ ! -f proxy/bazel-bin/envoy ]; then
            echo "::error::Envoy build did not complete after 2 passes."
            exit 1
          fi

  build-istio:
    name: Build Istio ${{ matrix.istio_version }} (${{ matrix.arch.name }})
    needs: [discover, build-envoy-2]
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        istio_version: ${{ fromJson(needs.discover.outputs.versions) }}
        arch:
          - name: amd64
            runner: ubuntu-24.04
          - name: arm64
            runner: ubuntu-24.04-arm
        exclude:
          - arch:
              name: ${{ inputs.arch == 'arm64' && 'amd64' || inputs.arch == 'amd64' && 'arm64' || 'none' }}
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/share/boost
          sudo docker image prune --all --force
          df -h /

      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true

      - name: Install Chainguard Apko
        run: |
          go install chainguard.dev/apko@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Find Envoy artifact
        id: find-envoy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_RUN=$(gh api "repos/${{ github.repository }}/actions/artifacts?name=envoy-${{ matrix.istio_version }}-${{ matrix.arch.name }}" \
            --jq '[.artifacts[] | select(.expired == false)] | first | .workflow_run.id // empty')
          echo "run_id=${ARTIFACT_RUN:-${{ github.run_id }}}" >> "$GITHUB_OUTPUT"

      - name: Download Envoy binary
        uses: actions/download-artifact@v4
        with:
          name: envoy-${{ matrix.istio_version }}-${{ matrix.arch.name }}
          path: proxy/bazel-bin
          run-id: ${{ steps.find-envoy.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make Envoy executable
        run: chmod +x proxy/bazel-bin/envoy

      - name: Build and push images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPORT_HUB: ghcr.io/${{ github.repository }}
        run: uv run ./build.py --version ${{ matrix.istio_version }} --arch ${{ matrix.arch.name }} --stage istio

  manifest:
    name: Create manifest for Istio ${{ matrix.istio_version }}
    needs: [discover, build-istio]
    if: inputs.arch == 'all' || inputs.arch == ''
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        istio_version: ${{ fromJson(needs.discover.outputs.versions) }}
    env:
      EXPORT_HUB: ghcr.io/${{ github.repository }}
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create multi-arch manifests
        run: |
          EXPORT_HUB="${EXPORT_HUB,,}"
          VERSION="${{ matrix.istio_version }}"
          MAJOR="${VERSION%.*}"
          TAGS=("${MAJOR}-fips" "${VERSION}-fips")

          for IMAGE in proxyv2 pilot; do
            for TAG in "${TAGS[@]}"; do
              echo "Creating manifest: ${EXPORT_HUB}/${IMAGE}:${TAG}"
              docker buildx imagetools create -t "${EXPORT_HUB}/${IMAGE}:${TAG}" \
                "${EXPORT_HUB}/${IMAGE}:${TAG}-amd64" \
                "${EXPORT_HUB}/${IMAGE}:${TAG}-arm64"
            done
          done
