---
name: Istio Build Workflow
on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:
    inputs:
      istio_version:
        description: 'Single Istio version to build (e.g., 1.26.2), or leave empty to auto-build up to 2 missing supported versions'
        required: false
        default: ''
        type: string
      arch:
        description: 'Architecture to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - amd64
          - arm64

jobs:
  discover:
    name: Discover versions to build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      versions: ${{ steps.resolve.outputs.versions }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Resolve versions to build
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPORT_HUB: ghcr.io/${{ github.repository }}
          INPUT_VERSION: ${{ inputs.istio_version }}
        run: uv run ./discover.py

  build-version:
    name: Build Istio ${{ matrix.istio_version }}
    needs: discover
    if: needs.discover.outputs.versions != '[]'
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        istio_version: ${{ fromJson(needs.discover.outputs.versions) }}
    uses: ./.github/workflows/build-version.yaml
    with:
      istio_version: ${{ matrix.istio_version }}
      arch: ${{ inputs.arch || 'all' }}
    secrets: inherit
