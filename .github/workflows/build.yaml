---
name: Istio Build Workflow
on:
  # schedule:
  #   - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:
    inputs:
      istio_version:
        description: 'Single Istio version to build (e.g., 1.26.2), or leave empty to build all supported versions'
        required: false
        default: ''
        type: string
      arch:
        description: 'Architecture to build (leave empty for both)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - amd64
          - arm64
  # push:
  #   branches:
  #     - master
  #     - main
  #     - 'releases/*'

jobs:
  discover:
    name: Discover versions to build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      versions: ${{ steps.resolve.outputs.versions }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Resolve versions to build
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPORT_HUB: ghcr.io/${{ github.repository }}
          INPUT_VERSION: ${{ inputs.istio_version }}
        run: uv run ./discover.py

  build-envoy:
    name: Build Envoy ${{ matrix.istio_version }} (${{ matrix.arch.name }})
    needs: discover
    if: needs.discover.outputs.versions != '[]'
    runs-on: ${{ matrix.arch.runner }}
    timeout-minutes: 330
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        istio_version: ${{ fromJson(needs.discover.outputs.versions) }}
        arch:
          - name: amd64
            runner: ubuntu-24.04
          - name: arm64
            runner: ubuntu-24.04-arm
        exclude:
          - arch:
              name: ${{ inputs.arch == 'arm64' && 'amd64' || inputs.arch == 'amd64' && 'arm64' || 'none' }}
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/share/boost
          sudo docker image prune --all --force
          df -h /

      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc++-18-dev \
            libc++abi-18-dev \
            libstdc++-12-dev
          # LLVM toolchain needs libtinfo5 which isn't in noble repos
          ARCH=$(dpkg --print-architecture)
          if [ "$ARCH" = "arm64" ]; then
            DEB="libtinfo5_6.3-2_arm64.deb"
            curl -sfLO "http://ports.ubuntu.com/pool/universe/n/ncurses/${DEB}"
          else
            DEB="libtinfo5_6.3-2ubuntu0.1_amd64.deb"
            curl -sfLO "http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/${DEB}"
          fi
          sudo dpkg -i "${DEB}"
          rm "${DEB}"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.istio_version }}-${{ matrix.arch.name }}
          repository-cache: true

      - name: Build Envoy with FIPS BoringSSL
        id: envoy-build
        continue-on-error: true
        run: uv run ./build.py --version ${{ matrix.istio_version }} --arch ${{ matrix.arch.name }} --stage envoy

      - name: Verify Envoy binary exists
        run: |
          if [ ! -f proxy/bazel-bin/envoy ]; then
            echo "::error::Envoy build did not complete. Re-run to resume from Bazel cache."
            exit 1
          fi

      - name: Upload Envoy binary
        if: steps.envoy-build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: envoy-${{ matrix.istio_version }}-${{ matrix.arch.name }}
          path: proxy/bazel-bin/envoy
          retention-days: 1

  build-istio:
    name: Build Istio ${{ matrix.istio_version }} (${{ matrix.arch.name }})
    needs: [discover, build-envoy]
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        istio_version: ${{ fromJson(needs.discover.outputs.versions) }}
        arch:
          - name: amd64
            runner: ubuntu-24.04
          - name: arm64
            runner: ubuntu-24.04-arm
        exclude:
          - arch:
              name: ${{ inputs.arch == 'arm64' && 'amd64' || inputs.arch == 'amd64' && 'arm64' || 'none' }}
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/share/boost
          sudo docker image prune --all --force
          df -h /

      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true

      - name: Install Chainguard Apko
        run: |
          go install chainguard.dev/apko@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Download Envoy binary
        uses: actions/download-artifact@v4
        with:
          name: envoy-${{ matrix.istio_version }}-${{ matrix.arch.name }}
          path: proxy/bazel-bin

      - name: Make Envoy executable
        run: chmod +x proxy/bazel-bin/envoy

      - name: Build and push images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPORT_HUB: ghcr.io/${{ github.repository }}
        run: uv run ./build.py --version ${{ matrix.istio_version }} --arch ${{ matrix.arch.name }} --stage istio

  manifest:
    name: Create manifest for Istio ${{ matrix.istio_version }}
    needs: [discover, build-istio]
    if: inputs.arch == ''
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        istio_version: ${{ fromJson(needs.discover.outputs.versions) }}
    env:
      EXPORT_HUB: ghcr.io/${{ github.repository }}
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create multi-arch manifests
        run: |
          EXPORT_HUB="${EXPORT_HUB,,}"
          VERSION="${{ matrix.istio_version }}"
          MAJOR="${VERSION%.*}"
          TAGS=("${MAJOR}-fips" "${VERSION}-fips")

          for IMAGE in proxyv2 pilot; do
            for TAG in "${TAGS[@]}"; do
              echo "Creating manifest: ${EXPORT_HUB}/${IMAGE}:${TAG}"
              docker buildx imagetools create -t "${EXPORT_HUB}/${IMAGE}:${TAG}" \
                "${EXPORT_HUB}/${IMAGE}:${TAG}-amd64" \
                "${EXPORT_HUB}/${IMAGE}:${TAG}-arm64"
            done
          done
