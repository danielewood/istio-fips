---
name: Istio Build Workflow
on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:
    inputs:
      istio_version:
        description: 'Single Istio version to build (e.g., 1.26.2), or leave empty to build all supported versions'
        required: false
        default: ''
        type: string
  push:
    branches:
      - master
      - main
      - 'releases/*'

jobs:
  discover:
    name: Discover versions to build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      versions: ${{ steps.resolve.outputs.versions }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Resolve versions to build
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPORT_HUB: ghcr.io/${{ github.repository }}
          INPUT_VERSION: ${{ inputs.istio_version }}
        run: uv run ./discover.py

  build:
    name: Build Istio ${{ matrix.istio_version }} (${{ matrix.arch.name }})
    needs: discover
    if: needs.discover.outputs.versions != '[]'
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        istio_version: ${{ fromJson(needs.discover.outputs.versions) }}
        arch:
          - name: amd64
            runner: ubuntu-24.04
          - name: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/share/boost
          sudo docker image prune --all --force
          df -h /

      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true

      - name: Install Chainguard Apko
        run: |
          go install chainguard.dev/apko@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc++-18-dev \
            libc++abi-18-dev \
            libstdc++-12-dev
          # LLVM toolchain needs libtinfo5 which isn't in noble repos - grab from jammy
          ARCH=$(dpkg --print-architecture)
          if [ "$ARCH" = "arm64" ]; then
            MIRROR="http://ports.ubuntu.com"
          else
            MIRROR="http://archive.ubuntu.com"
          fi
          curl -sfLO "${MIRROR}/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_${ARCH}.deb"
          sudo dpkg -i "libtinfo5_6.3-2ubuntu0.1_${ARCH}.deb"
          rm "libtinfo5_6.3-2ubuntu0.1_${ARCH}.deb"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.istio_version }}-${{ matrix.arch.name }}
          repository-cache: true

      - name: Build and push images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPORT_HUB: ghcr.io/${{ github.repository }}
        run: uv run ./build.py --version ${{ matrix.istio_version }} --arch ${{ matrix.arch.name }}

  manifest:
    name: Create manifest for Istio ${{ matrix.istio_version }}
    needs: [discover, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        istio_version: ${{ fromJson(needs.discover.outputs.versions) }}
    env:
      EXPORT_HUB: ghcr.io/${{ github.repository }}
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create multi-arch manifests
        run: |
          EXPORT_HUB="${EXPORT_HUB,,}"
          VERSION="${{ matrix.istio_version }}"
          MAJOR="${VERSION%.*}"
          TAGS=("${MAJOR}-fips" "${VERSION}-fips")

          for IMAGE in proxyv2 pilot; do
            for TAG in "${TAGS[@]}"; do
              echo "Creating manifest: ${EXPORT_HUB}/${IMAGE}:${TAG}"
              docker buildx imagetools create -t "${EXPORT_HUB}/${IMAGE}:${TAG}" \
                "${EXPORT_HUB}/${IMAGE}:${TAG}-amd64" \
                "${EXPORT_HUB}/${IMAGE}:${TAG}-arm64"
            done
          done
